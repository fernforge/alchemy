name: release

# Publishes all three packages when you cut a GitHub Release.
# One-time setup before the first automated run:
#   - npm:  add an automation token as the repo secret NPM_TOKEN (Settings > Secrets).
#           Provenance needs the package `repository` field, which is already set.
#   - PyPI: register a Trusted Publisher (OIDC) for this repo on pypi.org instead of a
#           token — Project > Settings > Publishing > add GitHub publisher with
#           workflow `release.yml` and environment `pypi`. No secret to store.
# Versions are read from each package's manifest; bump them before tagging the release.

on:
  release:
    types: [published]

jobs:
  npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    strategy:
      matrix:
        dir: [".", "mcp"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: node scripts/sync-rules.mjs
      - working-directory: ${{ matrix.dir }}
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  pypi:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # PyPI Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: node scripts/sync-rules.mjs
      - name: Build
        run: |
          python -m pip install --upgrade build
          cd python && python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist
