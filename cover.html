<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  html,body{margin:0;padding:0;}
  *{box-sizing:border-box;}
  .stage{
    width:1000px;height:420px;position:relative;overflow:hidden;
    font-family:Georgia,'Times New Roman',serif;
    background:
      radial-gradient(120% 140% at 82% 30%, rgba(212,175,55,0.18) 0%, rgba(212,175,55,0.0) 45%),
      radial-gradient(90% 120% at 12% 75%, rgba(120,130,150,0.10) 0%, rgba(0,0,0,0) 50%),
      linear-gradient(135deg,#0d1320 0%,#131a2b 45%,#0a0f1a 100%);
  }
  /* alchemical seal motif on the right */
  .seal{position:absolute;right:55px;top:50%;transform:translateY(-50%);width:310px;height:310px;}
  .ring{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:310px;height:310px;border-radius:50%;
    border:1px solid rgba(212,175,55,0.30);
  }
  .ring2{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:236px;height:236px;border-radius:50%;
    border:1px solid rgba(212,175,55,0.16);
  }
  /* tick marks around outer ring */
  .ticks{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:310px;height:310px;}
  .ticks i{position:absolute;left:50%;top:0;width:1px;height:9px;background:rgba(212,175,55,0.45);transform-origin:50% 155px;}
  /* alchemical sun = symbol for gold (circle + central dot + rays) */
  .sun{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:62px;height:62px;border-radius:50%;
    border:2.5px solid rgba(232,198,107,0.92);
    box-shadow:0 0 38px 6px rgba(212,175,55,0.22);
    display:flex;align-items:center;justify-content:center;
  }
  .sun:after{content:"";width:9px;height:9px;border-radius:50%;background:#E8C66B;box-shadow:0 0 10px 2px rgba(232,198,107,0.7);}

  .wrap{position:absolute;left:64px;top:0;height:100%;display:flex;flex-direction:column;justify-content:center;}

  .kicker{
    font-family:'Segoe UI',Arial,sans-serif;
    letter-spacing:6px;font-size:15px;font-weight:600;
    color:#8a93a6;text-transform:uppercase;margin-bottom:14px;
  }
  .title{
    font-size:118px;font-weight:bold;line-height:0.9;margin:0;
    background:linear-gradient(100deg,#9aa4b6 0%,#c2c6d4 24%,#E8C66B 58%,#D4AF37 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 3px 14px rgba(0,0,0,0.45));
  }
  .tag{
    font-family:'Segoe UI',Arial,sans-serif;
    font-size:22px;color:#c7cdd9;margin-top:20px;font-weight:400;
  }
  .tag b{color:#E8C66B;font-weight:600;}
  .handle{
    font-family:'Consolas','Courier New',monospace;
    font-size:15px;color:#6f7891;margin-top:26px;letter-spacing:0.5px;
  }
  .arrow{color:#D4AF37;}
</style>
</head>
<body>
<div class="stage">
  <div class="seal">
    <div class="ring"></div>
    <div class="ring2"></div>
    <div class="ticks" id="ticks"></div>
    <div class="sun"></div>
  </div>
  <script>
    var t=document.getElementById('ticks');
    for(var d=0;d<360;d+=15){var e=document.createElement('i');e.style.transform='translateX(-50%) rotate('+d+'deg)';t.appendChild(e);}
  </script>
  <div class="wrap">
    <div class="kicker">lead &nbsp;&rarr;&nbsp; gold</div>
    <div class="title">Alchemy</div>
    <div class="tag">Make AI prose read human. <b>Write like a person, not an LLM.</b></div>
    <div class="handle">npm i @fernforge/alchemy &nbsp;<span class="arrow">&bull;</span>&nbsp; github.com/fernforge/alchemy</div>
  </div>
</div>
</body>
</html>
